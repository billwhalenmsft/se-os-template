<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="blazerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#0d419d"/>
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="50%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="url(#bgGrad)" rx="12"/>
  <rect width="480" height="160" fill="none" stroke="url(#neonGlow)" stroke-width="1.5" rx="12" opacity="0.4"/>

  <!-- ── BOT MASCOT (left side) ───────────────────────────────────────── -->
  <!-- Antenna -->
  <line x1="80" y1="28" x2="80" y2="42" stroke="#58a6ff" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="80" cy="25" r="5" fill="#00f5ff" filter="url(#strongGlow)" opacity="0.9"/>

  <!-- Head -->
  <rect x="55" y="42" width="50" height="40" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>

  <!-- Eyes — glowing -->
  <rect x="63" y="53" width="12" height="8" rx="3" fill="#00f5ff" filter="url(#strongGlow)" opacity="0.95"/>
  <rect x="85" y="53" width="12" height="8" rx="3" fill="#00f5ff" filter="url(#strongGlow)" opacity="0.95"/>

  <!-- Mouth smile -->
  <path d="M67 72 Q80 80 93 72" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Neck -->
  <rect x="73" y="82" width="14" height="8" fill="#21262d"/>

  <!-- BLAZER BODY -->
  <path d="M40 90 L80 90 L80 145 L40 145 Z" fill="url(#blazerGrad)" rx="2"/>
  <path d="M80 90 L120 90 L120 145 L80 145 Z" fill="url(#blazerGrad)"/>

  <!-- Blazer lapels -->
  <path d="M80 90 L60 100 L60 115 L80 120 Z" fill="#1a4fa0" opacity="0.8"/>
  <path d="M80 90 L100 100 L100 115 L80 120 Z" fill="#1a4fa0" opacity="0.8"/>

  <!-- White shirt / tie -->
  <path d="M80 90 L73 100 L76 120 L80 125 L84 120 L87 100 Z" fill="#e6edf3" opacity="0.9"/>
  <!-- Tie -->
  <path d="M78 96 L82 96 L84 115 L80 122 L76 115 Z" fill="#ff6b6b" opacity="0.85"/>

  <!-- Pocket square (left chest) -->
  <rect x="47" y="100" width="10" height="7" rx="1" fill="#bc8cff" opacity="0.8"/>
  <path d="M47 100 L52 96 L57 100" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.9"/>

  <!-- Arms -->
  <rect x="22" y="92" width="18" height="44" rx="8" fill="url(#blazerGrad)"/>
  <rect x="120" y="92" width="18" height="44" rx="8" fill="url(#blazerGrad)"/>

  <!-- Hands -->
  <ellipse cx="31" cy="139" rx="9" ry="7" fill="#30363d"/>
  <ellipse cx="129" cy="139" rx="9" ry="7" fill="#30363d"/>

  <!-- Tiny laptop in hands -->
  <rect x="22" y="132" width="18" height="11" rx="2" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <rect x="23" y="133" width="16" height="8" rx="1" fill="#0a1628"/>
  <rect x="24" y="134" width="6" height="1" rx="0.5" fill="#00f5ff" opacity="0.6"/>
  <rect x="24" y="136" width="10" height="1" rx="0.5" fill="#58a6ff" opacity="0.4"/>
  <rect x="24" y="138" width="8" height="1" rx="0.5" fill="#58a6ff" opacity="0.3"/>

  <!-- ── TEXT (right side) ─────────────────────────────────────────────── -->
  <!-- Main title -->
  <text x="165" y="72" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-1" fill="url(#accentGrad)" filter="url(#glow)">Bots in Blazers</text>

  <!-- Subtitle -->
  <text x="167" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="2">DISCRETE MANUFACTURING CoE</text>

  <!-- Divider line -->
  <line x1="165" y1="108" x2="450" y2="108" stroke="url(#neonGlow)" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="167" y="126" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#58a6ff" opacity="0.8">🤖 Autonomous · 👔 Professional · ⚡ Always On</text>

  <!-- Bottom badges -->
  <rect x="167" y="136" width="54" height="16" rx="8" fill="rgba(63,185,80,0.15)" stroke="#3fb950" stroke-width="1"/>
  <text x="194" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">LIVE</text>

  <rect x="228" y="136" width="84" height="16" rx="8" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="1"/>
  <text x="270" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle" font-weight="600">GPT-4o Powered</text>

  <rect x="319" y="136" width="98" height="16" rx="8" fill="rgba(188,140,255,0.12)" stroke="#bc8cff" stroke-width="1"/>
  <text x="368" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#bc8cff" text-anchor="middle" font-weight="600">Microsoft Azure</text>

  <!-- Corner accent dots -->
  <circle cx="20" cy="20" r="3" fill="#58a6ff" opacity="0.3"/>
  <circle cx="460" cy="20" r="3" fill="#bc8cff" opacity="0.3"/>
  <circle cx="20" cy="140" r="3" fill="#3fb950" opacity="0.3"/>
  <circle cx="460" cy="140" r="3" fill="#00f5ff" opacity="0.3"/>
</svg>
