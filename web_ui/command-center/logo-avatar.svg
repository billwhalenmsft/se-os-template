<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="blazer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#0d419d"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="50%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#30363d" stroke-width="1" opacity="0.4"/>

  <!-- Antenna -->
  <line x1="100" y1="20" x2="100" y2="40" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="100" cy="16" r="6" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="100" cy="16" r="3" fill="white"/>

  <!-- Head -->
  <rect x="62" y="40" width="76" height="58" rx="14" fill="#21262d" stroke="#30363d" stroke-width="2"/>

  <!-- Eyes -->
  <rect x="72" y="55" width="18" height="12" rx="4" fill="#00f5ff" filter="url(#glow)"/>
  <rect x="110" y="55" width="18" height="12" rx="4" fill="#00f5ff" filter="url(#glow)"/>
  <!-- Eye shine -->
  <rect x="74" y="57" width="5" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="112" y="57" width="5" height="4" rx="2" fill="white" opacity="0.6"/>

  <!-- Smile -->
  <path d="M78 82 Q100 96 122 82" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Neck -->
  <rect x="90" y="98" width="20" height="10" fill="#21262d"/>

  <!-- BLAZER -->
  <path d="M30 108 Q40 105 100 108 Q160 105 170 108 L172 175 Q100 185 28 175 Z" fill="url(#blazer)"/>

  <!-- Lapels -->
  <path d="M100 108 L72 120 L75 148 L100 155 Z" fill="#1a4fa0" opacity="0.7"/>
  <path d="M100 108 L128 120 L125 148 L100 155 Z" fill="#1a4fa0" opacity="0.7"/>

  <!-- Shirt & tie -->
  <path d="M100 108 L90 120 L94 150 L100 158 L106 150 L110 120 Z" fill="#e6edf3"/>
  <path d="M97 112 L103 112 L107 145 L100 155 L93 145 Z" fill="#ff6b6b" opacity="0.9"/>

  <!-- Pocket square -->
  <rect x="40" y="120" width="14" height="10" rx="2" fill="#bc8cff" opacity="0.7"/>
  <path d="M40 120 L47 114 L54 120" fill="none" stroke="#bc8cff" stroke-width="2"/>

  <!-- Text at bottom -->
  <text x="100" y="193" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="800" fill="#58a6ff" text-anchor="middle" letter-spacing="1">BOTS IN BLAZERS</text>
</svg>
