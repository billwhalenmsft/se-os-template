<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — Bots in Blazers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
    }
    .bot { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: #f0f6fc; margin-bottom: 0.75rem; }
    p { color: #8b949e; line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 2rem;
      font-family: monospace;
    }
    a.btn {
      display: inline-block;
      background: #238636;
      color: #fff;
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    a.btn:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bot">🤵</div>
    <h1>Members Only</h1>
    <p>This is the <strong>Bots in Blazers</strong> CoE Command Center — a private workspace for the Discrete Manufacturing AI team.</p>
    <div class="badge">bots-in-blazers.fun</div>
    <br>
    <a class="btn" href="/.auth/login/github">Sign in with GitHub</a>
  </div>
</body>
</html>
