<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft 365 Copilot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🤖</text></svg>" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/styles/github-dark.min.css" rel="stylesheet" />
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ─── M365 Copilot Dark Palette ─── */
    :root {
      --bg:        #1b1b1b;
      --sidebar:   #1f1f1f;
      --surface:   #2d2d2d;
      --surface2:  #3a3a3a;
      --border:    rgba(255,255,255,0.08);
      --text:      #ffffff;
      --text2:     #c8c8c8;
      --text3:     #888888;
      --accent:    #0078d4;
      --accent-h:  #106ebe;
      --hover:     rgba(255,255,255,0.06);
      --active:    rgba(255,255,255,0.10);
      --input-bg:  #2d2d2d;
      --radius:    8px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --font: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 192px;
      min-width: 192px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-top {
      padding: 12px 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Copilot logo row */
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 4px;
    }
    .copilot-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c23e8c, #7b2fb9, #0e62d0, #3dbab6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* New chat button */
    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.18); }
    .new-chat-btn svg { flex-shrink: 0; }

    /* Nav items (Search, Library) */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-item:hover { background: var(--hover); color: var(--text); }
    .nav-item.active { background: var(--active); color: var(--text); }
    .nav-item svg { flex-shrink: 0; opacity: 0.8; }

    /* Section headers */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      padding: 10px 10px 4px;
      text-transform: none;
      letter-spacing: 0;
    }

    /* Agent list */
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .agent-item:hover { background: var(--hover); color: var(--text); }
    .agent-item.active { background: var(--active); color: var(--text); }

    .agent-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .agent-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Chat history */
    .chat-hist-item {
      display: flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text3);
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .chat-hist-item:hover { background: var(--hover); color: var(--text2); }

    /* Sidebar footer - user profile */
    .sidebar-footer {
      padding: 8px;
      border-top: 1px solid var(--border);
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-row:hover { background: var(--hover); }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0078d4, #00b4d8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 12px; font-weight: 600; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-sub { font-size: 11px; color: var(--text3); }

    /* ─── Main area ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      height: 52px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      font-size: 13px;
      color: var(--text2);
    }
    .agent-selector:hover { background: var(--surface2); }
    .agent-selector-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .agent-selector-name { font-weight: 600; color: var(--text); font-size: 13px; }
    .mode-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .mode-badge:hover { background: var(--surface2); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-size: 16px;
    }
    .icon-btn:hover { background: var(--hover); color: var(--text2); }

    /* ─── Chat area ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 6px; }

    /* Empty state */
    .empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding-bottom: 80px;
    }
    .empty-greeting {
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .empty-greeting span { color: var(--accent); }

    /* Messages */
    .messages-list { padding: 20px 0 20px; max-width: 800px; margin: 0 auto; width: 100%; }

    .msg-group { margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-start; }
    .msg-group.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-top: 2px;
    }
    .msg-avatar.copilot { background: linear-gradient(135deg, #c23e8c, #7b2fb9, #0e62d0, #3dbab6); }
    .msg-avatar.user { background: linear-gradient(135deg, #0078d4, #00b4d8); font-weight: 700; color: white; }

    .msg-content { flex: 1; min-width: 0; max-width: 680px; }
    .msg-group.user .msg-content { display: flex; flex-direction: column; align-items: flex-end; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }
    .msg-group.user .msg-bubble {
      background: var(--surface);
      border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
      max-width: 500px;
    }
    .msg-group.assistant .msg-bubble {
      background: transparent;
      padding-left: 0;
    }

    .msg-sender { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 4px; }
    .msg-group.user .msg-sender { text-align: right; }

    /* Markdown in assistant messages */
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 6px; font-weight: 600; }
    .msg-bubble h1 { font-size: 18px; }
    .msg-bubble h2 { font-size: 16px; }
    .msg-bubble h3 { font-size: 14px; }
    .msg-bubble p { margin: 0 0 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { margin: 6px 0 8px 20px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble code { font-family: "Cascadia Code", Consolas, monospace; font-size: 13px; background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px; }
    .msg-bubble pre { margin: 8px 0; border-radius: var(--radius); overflow: hidden; }
    .msg-bubble pre code { background: none; padding: 0; font-size: 13px; }
    .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--text2); margin: 8px 0; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .msg-bubble th { background: var(--surface); font-weight: 600; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 0; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text3);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }

    /* ─── Input area ─── */
    .input-area {
      padding: 10px 20px 16px;
      flex-shrink: 0;
      max-width: 840px;
      margin: 0 auto;
      width: 100%;
      padding-left: calc((100% - 840px)/2 + 20px);
      padding-right: calc((100% - 840px)/2 + 20px);
    }
    @media (max-width: 880px) {
      .input-area { padding: 10px 16px 16px; }
    }

    .input-box {
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }

    .input-prefix { color: var(--text3); cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.15s; }
    .input-prefix:hover { color: var(--text2); }

    .input-textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      resize: none;
      line-height: 1.5;
      min-height: 22px;
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .input-textarea::placeholder { color: var(--text3); }
    .input-textarea::-webkit-scrollbar { width: 4px; }

    .input-buttons { display: flex; align-items: center; gap: 4px; }
    .input-icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-size: 16px;
    }
    .input-icon-btn:hover { background: var(--hover); color: var(--text2); }
    .input-icon-btn.active { color: var(--accent); }

    .send-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      font-size: 14px;
    }
    .send-btn:hover { background: var(--accent-h); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }

    /* Prompt chips */
    .prompt-chips {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chip:hover { background: var(--surface2); border-color: rgba(255,255,255,0.18); }

    /* Endpoint picker (settings popover) */
    .settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .settings-overlay.open { display: flex; }
    .settings-panel {
      background: #2d2d2d;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 20px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .settings-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .settings-field { margin-bottom: 12px; }
    .settings-field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .settings-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
    }
    .settings-field input:focus { border-color: var(--accent); }
    .settings-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-primary { padding: 7px 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-ghost { padding: 7px 16px; background: none; color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; }
    .btn-ghost:hover { background: var(--hover); }

    /* Status bar */
    .status-bar {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      padding: 2px 0 6px;
    }
    .status-bar.error { color: #f1707a; }
    .status-bar.ok { color: #4caf81; }

    /* Scroll to bottom button */
    .scroll-btn {
      position: fixed;
      bottom: 120px;
      right: 24px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s;
      z-index: 50;
    }
    .scroll-btn.visible { display: flex; }
    .scroll-btn:hover { background: var(--surface); }
  </style>
</head>
<body>

<!-- ═══════════════ LEFT SIDEBAR ═══════════════ -->
<nav class="sidebar">
  <div class="sidebar-top">
    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="copilot-icon">✦</div>
    </div>

    <!-- New chat -->
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>

    <!-- Nav -->
    <div class="nav-item" id="searchNav">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </div>
    <div class="nav-item" id="libraryNav">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5z"/></svg>
      Library
    </div>
  </div>

  <div class="sidebar-scroll">
    <!-- Agents section -->
    <div class="section-label">Agents</div>
    <div id="agentsList">
      <!-- populated by JS -->
    </div>
    <div class="agent-item" id="newAgentBtn">
      <div class="agent-icon" style="background:rgba(255,255,255,0.06);">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <span class="agent-name" style="color:var(--text3)">New agent</span>
    </div>
    <div class="agent-item" style="margin-bottom:6px">
      <div class="agent-icon" style="background:rgba(255,255,255,0.06);font-size:10px;color:var(--text3)">•••</div>
      <span class="agent-name" style="color:var(--text3)">All agents</span>
    </div>

    <!-- Chat history -->
    <div class="section-label">Chats</div>
    <div id="chatHistory">
      <!-- populated by JS -->
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar" id="userAvatarEl">BW</div>
      <div class="user-info">
        <div class="user-name" id="userNameEl">Bill Whalen</div>
        <div class="user-sub">M365 Copilot (Premium)</div>
      </div>
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="opacity:0.4"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>
  </div>
</nav>

<!-- ═══════════════ MAIN AREA ═══════════════ -->
<div class="main">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="agent-selector" id="agentSelectorBtn">
        <div class="agent-selector-icon" id="topbarAgentIcon">✦</div>
        <span class="agent-selector-name" id="topbarAgentName">RAPP</span>
      </div>
      <div class="mode-badge">
        Auto
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" title="Feedback">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn" title="Share">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

  <!-- Chat / Empty state -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-greeting">What can I <span>help</span> you with?</div>
    </div>
    <div class="messages-list" id="messagesList" style="display:none"></div>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <span class="input-prefix" title="Attach">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </span>
      <textarea
        class="input-textarea"
        id="inputEl"
        placeholder="Message Copilot"
        rows="1"
      ></textarea>
      <div class="input-buttons">
        <button class="input-icon-btn" id="micBtn" title="Voice">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>

        People
      </div>
      <div class="chip" data-prompt="What are my open todos and current projects?">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        More
      </div>
    </div>
  </div>
</div>

<!-- Scroll to bottom -->
<button class="scroll-btn" id="scrollBtn">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
</button>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>⚙ Connection Settings</h3>
    <div class="settings-field">
      <label>API Endpoint</label>
      <input type="text" id="cfgEndpoint" placeholder="http://localhost:7071/api/businessinsightbot_function" />
    </div>
    <div class="settings-field">
      <label>Function Key (optional)</label>
      <input type="password" id="cfgKey" placeholder="Leave blank for local dev" />
    </div>
    <div class="settings-field">
      <label>User GUID</label>
      <input type="text" id="cfgGuid" placeholder="c0p110t0-aaaa-bbbb-cccc-123456789abc" />
    </div>
    <div class="settings-field">
      <label>Display Name</label>
      <input type="text" id="cfgName" placeholder="Bill Whalen" />
    </div>
    <div class="settings-actions">
      <button class="btn-ghost" id="cfgCancelBtn">Cancel</button>
      <button class="btn-primary" id="cfgSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Highlight.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/highlight.min.js"></script>

<script>
// ─── Config (persisted in localStorage) ───────────────────────────────────────
const STORAGE_KEY = 'copilot_demo_cfg';
const CHATS_KEY   = 'copilot_demo_chats';

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveCfg(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
function loadChats() {
  try { return JSON.parse(localStorage.getItem(CHATS_KEY)) || []; } catch { return []; }
}
function saveChats(c) { localStorage.setItem(CHATS_KEY, JSON.stringify(c)); }

let cfg = {
  endpoint: 'http://localhost:7071/api/businessinsightbot_function',
  key: '',
  guid: 'c0p110t0-aaaa-bbbb-cccc-123456789abc',
  name: 'Bill Whalen',
  ...loadCfg()
};

// ─── Agent definitions (sidebar + topbar) ─────────────────────────────────────
const AGENTS = [
  { id: 'rapp',       name: 'RAPP',            icon: '✦', color: '#6b2fa0', bg: '#3a1a5a' },
  { id: 'researcher', name: 'Researcher',       icon: '🔬', color: '#0e62d0', bg: '#1a3a5c' },
  { id: 'analyst',    name: 'Analyst',          icon: '📊', color: '#107c10', bg: '#1a3a1a' },
  { id: 'sales',      name: 'Sales',            icon: '💼', color: '#0078d4', bg: '#1a3050' },
  { id: 'cs_agent',   name: 'Customer Service', icon: '🎧', color: '#c23e8c', bg: '#4a1a3a' },
  { id: 'd365',       name: 'D365 Demo',        icon: '🏢', color: '#e3008c', bg: '#4a1030' },
  { id: 'memory',     name: 'Memory',           icon: '🧠', color: '#7b2fb9', bg: '#3a1a50' },
  { id: 'cowork',     name: 'Cowork',           icon: '✦', color: '#c23e8c', bg: 'linear-gradient(135deg,#c23e8c,#7b2fb9,#0e62d0,#3dbab6)' },
];

let activeAgentId = 'rapp';
let currentChat = { id: Date.now().toString(), messages: [], title: 'New chat' };
let allChats = loadChats();
let conversationHistory = [];
let isTyping = false;

// ─── DOM refs ──────────────────────────────────────────────────────────────────
const agentsListEl   = document.getElementById('agentsList');
const chatHistoryEl  = document.getElementById('chatHistory');
const emptyStateEl   = document.getElementById('emptyState');
const messagesListEl = document.getElementById('messagesList');
const chatAreaEl     = document.getElementById('chatArea');
const inputEl        = document.getElementById('inputEl');
const sendBtn        = document.getElementById('sendBtn');
const statusBar      = document.getElementById('statusBar');
const topbarName     = document.getElementById('topbarAgentName');
const topbarIcon     = document.getElementById('topbarAgentIcon');
const userAvatarEl   = document.getElementById('userAvatarEl');
const userNameEl     = document.getElementById('userNameEl');
const scrollBtn      = document.getElementById('scrollBtn');

// ─── Init ──────────────────────────────────────────────────────────────────────
function init() {
  renderAgentsList();
  renderChatHistory();
  applyUser();
  setupEvents();
}

function applyUser() {
  const initials = cfg.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  userAvatarEl.textContent = initials;
  userNameEl.textContent = cfg.name;
}

// ─── Sidebar agents ────────────────────────────────────────────────────────────
function renderAgentsList() {
  agentsListEl.innerHTML = '';
  AGENTS.forEach(a => {
    const el = document.createElement('div');
    el.className = 'agent-item' + (a.id === activeAgentId ? ' active' : '');
    el.dataset.id = a.id;
    const bgStyle = a.bg.startsWith('linear') ? a.bg : a.bg;
    el.innerHTML = `
      <div class="agent-icon" style="background:${a.bg};color:${a.color.startsWith('#') ? 'white' : 'white'}">${a.icon}</div>
      <span class="agent-name">${a.name}</span>
    `;
    el.addEventListener('click', () => selectAgent(a.id));
    agentsListEl.appendChild(el);
  });
}

function selectAgent(id) {
  activeAgentId = id;
  const a = AGENTS.find(x => x.id === id);
  if (!a) return;
  renderAgentsList();
  topbarName.textContent = a.name;
  topbarIcon.textContent = a.icon;
  topbarIcon.style.background = a.bg.startsWith('linear') ? a.bg : a.bg;
  setStatus('');
}

// ─── Chat history ──────────────────────────────────────────────────────────────
function renderChatHistory() {
  chatHistoryEl.innerHTML = '';
  const recent = allChats.slice().reverse().slice(0, 15);
  recent.forEach(chat => {
    const el = document.createElement('div');
    el.className = 'chat-hist-item';
    el.textContent = chat.title || 'Chat';
    el.title = chat.title || 'Chat';
    el.addEventListener('click', () => loadChat(chat));
    chatHistoryEl.appendChild(el);
  });
}

function loadChat(chat) {
  currentChat = chat;
  conversationHistory = chat.messages.map(m => ({ role: m.role, content: m.content }));
  messagesListEl.innerHTML = '';
  chat.messages.forEach(m => appendMessage(m.role, m.content, false));
  showMessages();
  scrollToBottom(false);
}

function saveCurrentChat() {
  if (currentChat.messages.length === 0) return;
  const idx = allChats.findIndex(c => c.id === currentChat.id);
  if (idx >= 0) allChats[idx] = currentChat;
  else allChats.push(currentChat);
  saveChats(allChats);
  renderChatHistory();
}

// ─── Messages ──────────────────────────────────────────────────────────────────
function showMessages() {
  emptyStateEl.style.display = 'none';
  messagesListEl.style.display = 'block';
}

function renderMarkdown(text) {
  // Code blocks first
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const highlighted = lang && hljs.getLanguage(lang)
      ? hljs.highlight(code.trim(), { language: lang }).value
      : hljs.highlightAuto(code.trim()).value;
    return `<pre><code class="hljs language-${lang || 'plaintext'}">${highlighted}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold/italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // HR
  text = text.replace(/^---$/gm, '<hr>');
  // Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Lists
  text = text.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Line breaks → paragraphs
  const paras = text.split(/\n\n+/);
  text = paras.map(p => {
    if (/^<(h[1-3]|ul|ol|pre|blockquote|hr)/.test(p.trim())) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');
  return text;
}

function appendMessage(role, content, animate = true) {
  showMessages();
  const group = document.createElement('div');
  group.className = `msg-group ${role === 'user' ? 'user' : 'assistant'}`;

  const senderName = role === 'user' ? cfg.name.split(' ')[0] : 'Copilot';
  const initials = cfg.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  const avatarHTML = role === 'user'
    ? `<div class="msg-avatar user">${initials}</div>`
    : `<div class="msg-avatar copilot">✦</div>`;

  const bubbleContent = role === 'user'
    ? `<div class="msg-sender">${senderName}</div><div class="msg-bubble">${content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
    : `<div class="msg-sender">Copilot</div><div class="msg-bubble">${renderMarkdown(content)}</div>`;

  group.innerHTML = `${avatarHTML}<div class="msg-content">${bubbleContent}</div>`;

  if (animate) {
    group.style.opacity = '0';
    group.style.transform = 'translateY(8px)';
    group.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
  }

  messagesListEl.appendChild(group);

  if (animate) {
    requestAnimationFrame(() => { group.style.opacity = '1'; group.style.transform = 'none'; });
  }

  scrollToBottom();
  return group;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg-group assistant';
  el.id = 'typingIndicator';
  el.innerHTML = `
    <div class="msg-avatar copilot">✦</div>
    <div class="msg-content">
      <div class="msg-sender">Copilot</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  messagesListEl.appendChild(el);
  scrollToBottom();
  return el;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ─── API call ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isTyping) return;

  inputEl.value = '';
  inputEl.style.height = '';
  sendBtn.disabled = true;
  isTyping = true;

  // Add to UI
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  currentChat.messages.push({ role: 'user', content: text });
  if (currentChat.title === 'New chat') currentChat.title = text.slice(0, 40);
  hideChips();

  // Show typing
  showMessages();
  const typingEl = showTyping();
  setStatus('');

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (cfg.key) headers['x-functions-key'] = cfg.key;

    const res = await fetch(cfg.endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        user_input: text,
        conversation_history: conversationHistory.slice(-20),
        user_guid: cfg.guid
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = data.assistant_response || data.response || '(no response)';

    removeTyping();
    appendMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    currentChat.messages.push({ role: 'assistant', content: reply });
    saveCurrentChat();
    setStatus('', 'ok');

  } catch (err) {
    removeTyping();
    const msg = err.message.includes('fetch') || err.message.includes('Failed')
      ? 'Cannot reach API — is the function app running?'
      : err.message;
    appendMessage('assistant', `⚠ **Connection error:** ${msg}\n\nCheck Settings (⚙) to verify the endpoint URL.`);
    setStatus(`Error: ${msg}`, 'error');
  }

  isTyping = false;
  sendBtn.disabled = inputEl.value.trim() === '';
}

// ─── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  statusBar.textContent = msg;
  statusBar.className = 'status-bar' + (type ? ` ${type}` : '');
}

function hideChips() {
  document.getElementById('promptChips').style.display = 'none';
}

function scrollToBottom(smooth = true) {
  chatAreaEl.scrollTo({ top: chatAreaEl.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

function newChat() {
  currentChat = { id: Date.now().toString(), messages: [], title: 'New chat' };
  conversationHistory = [];
  messagesListEl.innerHTML = '';
  messagesListEl.style.display = 'none';
  emptyStateEl.style.display = 'flex';
  document.getElementById('promptChips').style.display = 'flex';
  setStatus('');
}

// ─── Auto-resize textarea ──────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  sendBtn.disabled = inputEl.value.trim() === '';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ─── Settings panel ────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('cfgEndpoint').value = cfg.endpoint;
  document.getElementById('cfgKey').value = cfg.key;
  document.getElementById('cfgGuid').value = cfg.guid;
  document.getElementById('cfgName').value = cfg.name;
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}
function saveSettings() {
  cfg.endpoint = document.getElementById('cfgEndpoint').value.trim() || cfg.endpoint;
  cfg.key      = document.getElementById('cfgKey').value.trim();
  cfg.guid     = document.getElementById('cfgGuid').value.trim() || cfg.guid;
  cfg.name     = document.getElementById('cfgName').value.trim() || cfg.name;
  saveCfg(cfg);
  applyUser();
  closeSettings();
  setStatus('Settings saved', 'ok');
  setTimeout(() => setStatus(''), 2000);
}

// ─── Event wiring ─────────────────────────────────────────────────────────────
function setupEvents() {
  sendBtn.addEventListener('click', sendMessage);
  document.getElementById('newChatBtn').addEventListener('click', newChat);
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.getElementById('cfgCancelBtn').addEventListener('click', closeSettings);
  document.getElementById('cfgSaveBtn').addEventListener('click', saveSettings);
  document.getElementById('settingsOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSettings();
  });
  document.getElementById('scrollBtn').addEventListener('click', () => scrollToBottom(true));

  // Prompt chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.dataset.prompt || '';
      inputEl.dispatchEvent(new Event('input'));
      inputEl.focus();
    });
  });

  // Scroll-to-bottom visibility
  chatAreaEl.addEventListener('scroll', () => {
    const atBottom = chatAreaEl.scrollHeight - chatAreaEl.scrollTop - chatAreaEl.clientHeight < 80;
    scrollBtn.classList.toggle('visible', !atBottom && messagesListEl.style.display !== 'none');
  });
}

// ─── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
